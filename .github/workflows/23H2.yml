name: 23H2

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-upload:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show available disk space before build
        shell: pwsh
        run: Get-PSDrive -PSProvider FileSystem

      - name: Build
        run: pwsh uup-dump-get-windows-iso.ps1 23H2 c:/output

      - name: Show available disk space after build
        shell: pwsh
        run: Get-PSDrive -PSProvider FileSystem

      - name: Build summary
        shell: pwsh
        run: |
          $iso = Get-Content (Resolve-Path c:/output/*.json) | ConvertFrom-Json
          Add-Content $env:GITHUB_STEP_SUMMARY @"
          | Property | Value |
          | :--- | :--- |
          | Name | $($iso.name) |
          | Build | $($iso.build) |
          | Checksum | $($iso.checksum) |
          | Image Name | $($iso.images[0].name) |
          "@

      - name: Install rclone
        shell: pwsh
        run: |
          Invoke-WebRequest https://downloads.rclone.org/rclone-current-windows-amd64.zip -OutFile rclone.zip
          Expand-Archive rclone.zip -DestinationPath rclone
          $rcloneDir = Get-ChildItem rclone -Directory | Select-Object -First 1
          echo "RCLONE_PATH=$($rcloneDir.FullName)\rclone.exe" >> $env:GITHUB_ENV

      - name: Configure MEGA remote
        shell: pwsh
        env:
          MEGA_USER: ${{ secrets.MEGA_USER }}
          MEGA_PASS: ${{ secrets.MEGA_PASS }}
        run: |
          # Create MEGA remote dynamically
          & "$env:RCLONE_PATH" config create mega mega user $env:MEGA_USER pass $env:MEGA_PASS --non-interactive

      - name: Upload all output to MEGA
        shell: pwsh
        run: |
          & "$env:RCLONE_PATH" copy "c:/output" mega:/23H2 `
            --include "*.json" `
            --include "*.iso" `
            --include "*.iso.sha256.txt" `
            --progress

      - name: Generate public links for all uploaded files
        shell: pwsh
        run: |
          Get-ChildItem c:/output | ForEach-Object {
              $link = & "$env:RCLONE_PATH" link mega:/23H2/$($_.Name)
              Write-Output "$($_.Name): $link"
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "$($_.Name): $link"
          }
